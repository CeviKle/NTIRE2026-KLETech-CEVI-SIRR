name: val_ep100_only
model_type: RDNetModel
num_gpu: 1
manual_seed: 42
test_only: true
precision: 32-true
accelerator: gpu
devices: 1
val_check_interval: 0.25
log_every_n_steps: 50
lightning:
  max_epochs: 100
  gradient_clip_val: null
  accumulate_grad_batches: 1
  deterministic: false
  strategy: auto
  profiler: null
  num_sanity_val_steps: 2
checkpoint:
  monitor: metrics/average/psnr
  mode: max
  save_top_k: 10
  save_last: true
datasets:
  train:
    name: NTIRE2026-train
    type: DSRTestDataset
    datadir: /NTIRE2026/C1_ReflRem/trian_5k
    enable_transforms: true
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 0
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: null
  val_datasets:
  - name: NTIRE2026-val
    type: DSRTestDataset
    mode: eval
    datadir: /NTIRE2026/C1_ReflRem/val_300
    io_backend:
      type: disk
    use_shuffle: false
    num_worker_per_gpu: 0
    batch_size_per_gpu: 1
network_g:
  type: RDNet
  channels:
  - 64
  - 128
  - 256
  - 512
  layers:
  - 2
  - 2
  - 4
  - 2
  num_subnet: 4
  loss_col: 4
  num_classes: 1000
  drop_path: 0
  save_memory: true
  inter_supv: true
  head_init_scale: null
  kernel_size: 3
  pretrained_models:
    cls_model: cls_model.pth
    base_network: focal.pth
path:
  pretrain_network_g: null
  param_key_g: params
  strict_load_g: true
  resume_state: null
  experiments_root: experiments
  visualization: null
  log: null
train:
  optim_g:
    type: AdamW
    baseball_lr: 0.0001
    other_lr: 0.0002
    weight_decay: 0.0
  scheduler:
    type: MultiStepLR
    milestones:
    - 150
    - 300
    - 450
    gamma: 0.5
  pixel_opt:
    type: MSELoss
    loss_weight: 1.0
    reduction: mean
  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      conv1_2: 0.1
      conv2_2: 0.1
      conv3_4: 1
      conv4_4: 1
      conv5_4: 1
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: 1.0
    style_weight: 0.0
    range_norm: false
    criterion: l1
  grad_opt:
    type: GradientLoss
    loss_weight: 1
val:
  save_img: true
  save_img_top_n: -1
  metrics:
    psnr:
      type: calculate_psnr
    ssim:
      type: calculate_ssim
logger:
  tensorboard:
    flush_secs: 5
    max_queue: 10
  wandb:
    enable: true
    project: xreflection
